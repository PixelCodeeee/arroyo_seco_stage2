name: Build and Deploy Canary (Private VPC)

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pixelcodeeee/arroyo_seco_stage2
  PROJECT_ID: beta-prime-489121 # 👈 Pulled from your terminal output
  ZONE: us-central1-a # Update if your VM is in a different zone

jobs:
  # --- 📦 PHASE 1: Build & Push to GHCR ---
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: 
          - api-gateway
          - auth-service
          - catalog-service
          - order-service
          - reservation-service
          - payment-service
          - announcements-service
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Canary Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:canary

  # --- 🏗️ PHASE 2: Deploy via IAP Tunnel ---
  deploy-canary-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_IAP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via IAP Tunnel (No SSH Keys Needed!)
        run: |
          gcloud compute ssh joshualuna@private-backend-vm \
            --zone=${{ env.ZONE }} \
            --tunnel-through-iap \
            --project=${{ env.PROJECT_ID }} \
            --command="
              # 1. Login to GHCR using your PAT
              echo '${{ secrets.GH_PAT }}' | docker login ghcr.io -u itsjluna --password-stdin
              
              # 2. Navigate to your specific project folder
              cd /home/joshualuna/arroyo_seco_stage2
              
              # 3. Pull the new images
              docker compose pull api-gateway-canary auth-service-canary catalog-service-canary order-service-canary reservation-service-canary payment-service-canary announcements-service-canary
              
              # 4. Restart Canary stack seamlessly
              docker compose up -d --no-deps api-gateway-canary auth-service-canary catalog-service-canary order-service-canary reservation-service-canary payment-service-canary announcements-service-canary
            "