name: K6 Load Testing Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch: # Permite ejecutar el workflow manualmente

jobs:
  k6_load_test:
    name: Run K6 Load Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: AlphaPrime1.
          MYSQL_DATABASE: arroyo_seco
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Initialize Database
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client
          mysql -h 127.0.0.1 -u root -p'AlphaPrime1.' arroyo_seco < init_db.sql

      - name: Install Dependencies
        run: |
          npm ci || true
          cd api-gateway && npm install
          cd ../auth-service && npm install
          cd ../catalog-service && npm install
          cd ../order-service && npm install
          cd ../payment-service && npm install
          cd ../reservation-service && npm install

      - name: Start Services
        run: |
          # Start services and redirect their output to log files
          cd auth-service && node server.js > ../auth.log 2>&1 &
          cd ../catalog-service && node server.js > ../catalog.log 2>&1 &
          cd ../order-service && node server.js > ../order.log 2>&1 &
          cd ../payment-service && node server.js > ../payment.log 2>&1 &
          cd ../reservation-service && node server.js > ../reservation.log 2>&1 &
          sleep 10
          cd ../api-gateway && node server.js > ../gateway.log 2>&1 &
          sleep 15 
          
          # Strictly check if the gateway is up. If it fails, print the crash logs and stop.
          if ! curl -f http://localhost:5000/health; then
            echo "❌ API Gateway failed to start! Printing gateway logs:"
            cat ../gateway.log
            echo "---"
            echo "Auth Service logs:"
            cat ../auth.log
            exit 1 # Force the workflow to fail here instead of moving to K6
          fi
      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 Cloud Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/k6-load-test.js
          flags: --out cloud
          token: ${{ secrets.K6_CLOUD_TOKEN }}
        env:
          K6_PROJECT_ID: ${{ secrets.K6_PROJECT_ID }} # Optional: If you prefer to pass it as env var instead of hardcoding in script
