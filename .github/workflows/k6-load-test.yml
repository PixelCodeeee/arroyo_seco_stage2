name: K6 Load Testing Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
  workflow_call:

jobs:
  k6_load_test:
    name: Run K6 Load Test
    runs-on: self-hosted

    services:
      mysql:
        image: mysql:8.0
        env:
          # 🚨 Tells the MySQL container to allow a blank root password
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: arroyo_seco
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Initialize Database
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client
          # 🚨 Removed the -p flag entirely to connect with no password
          mysql -h 127.0.0.1 -u root arroyo_seco < init_db.sql

      - name: Install Dependencies
        run: |
          npm ci || true
          cd api-gateway && npm install
          cd ../auth-service && npm install
          cd ../catalog-service && npm install
          cd ../order-service && npm install
          cd ../payment-service && npm install
          cd ../reservation-service && npm install

      - name: Start Services
        run: |
          # 🚨 Removed 'export PORT=5002' so it doesn't hijack the API Gateway!
          export DB_HOST=127.0.0.1
          export DB_USER=root
          export DB_PASSWORD=''
          export DB_NAME=arroyo_seco
          export JWT_SECRET=123

          (cd auth-service && DB_HOST=$DB_HOST DB_USER=$DB_USER DB_PASSWORD=$DB_PASSWORD DB_NAME=$DB_NAME JWT_SECRET=$JWT_SECRET node server.js > ../auth.log 2>&1) &
          (cd catalog-service && PORT=5002 DB_HOST=$DB_HOST DB_USER=$DB_USER DB_PASSWORD=$DB_PASSWORD DB_NAME=$DB_NAME JWT_SECRET=$JWT_SECRET node server.js > ../catalog.log 2>&1) &
          (cd order-service && DB_HOST=$DB_HOST DB_USER=$DB_USER DB_PASSWORD=$DB_PASSWORD DB_NAME=$DB_NAME JWT_SECRET=$JWT_SECRET node server.js > ../order.log 2>&1) &
          (cd payment-service && DB_HOST=$DB_HOST DB_USER=$DB_USER DB_PASSWORD=$DB_PASSWORD DB_NAME=$DB_NAME JWT_SECRET=$JWT_SECRET node server.js > ../payment.log 2>&1) &
          (cd reservation-service && DB_HOST=$DB_HOST DB_USER=$DB_USER DB_PASSWORD=$DB_PASSWORD DB_NAME=$DB_NAME JWT_SECRET=$JWT_SECRET node server.js > ../reservation.log 2>&1) &
          
          sleep 10
          
          # The gateway will naturally default to 5000 now
          (cd api-gateway && node server.js > ../gateway.log 2>&1) &
          
          sleep 15 
          
          if ! curl -f http://localhost:5000/health; then
            echo "❌ API Gateway failed to start! Printing logs:"
            cat gateway.log
            exit 1 
          fi

          # 🚨 Updated to hit the Spanish route that your Gateway actually uses
          echo "Testing /api/productos endpoint..."
          if ! curl -f http://localhost:5000/api/productos; then
            echo "❌ /api/productos endpoint failed! Printing API Gateway logs:"
            echo "--- Gateway Logs ---"
            cat gateway.log
            exit 1
          fi

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 Cloud Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/k6-load-test.js
          flags: --out cloud
          token: ${{ secrets.K6_CLOUD_TOKEN }}
        env:
          K6_PROJECT_ID: ${{ secrets.K6_PROJECT_ID }}
          API_URL: http://172.17.0.1:5000
