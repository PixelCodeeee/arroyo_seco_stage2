name: Automated Daily Audit - ADA SYSTEM

# This schedule uses UTC time. 
# 14:00 UTC is 8:00 AM in Querétaro (CST).
on:
  workflow_dispatch: # Manual testing
  schedule:
    - cron: '0 14 * * 1-5' # Runs Monday to Friday at 8:00 AM CST

jobs:
  create_standup_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%A, %B %d, %Y')" >> $GITHUB_ENV

      - name: Create Standup Issue
        uses: imjohnbo/issue-bot@v3
        with:
          assignees: "Karenn204, MargothR, vane553, YannyMor, itsjluna" 
          labels: "daily-standup"
          title: "Daily Standup ☕ - ${{ env.date }}"
          body: |
            Good morning, @Karenn204 @MargothR @vane553 @YannyMor @itsjluna
            
            Please reply to this thread by **06:00 PM QUERETARO TIME** with your standup update. 
            
            ### 1. What did you do yesterday?
            - 
            
            ### 2. What will you do today?
            - 
            
            ### 3. Are there any blockers?
            - 
            
            *(Note: Drop screenshots directly into this comment box for evidence, or link your PRs using #)*
