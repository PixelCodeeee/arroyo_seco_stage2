name: Promote Canary to Stable

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
    inputs:
      services:
        description: 'Comma-separated services to promote (or "all")'
        required: true
        default: 'all'

env:
  IMAGE_PREFIX: ghcr.io/itsjluna/arroyo_seco_stage2

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - order-service
          - reservation-service
          - payment-service
          - announcements-service

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull canary and re-tag as stable
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:canary
          docker tag  ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:canary \
                      ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:stable
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:stable