version: '3.8'

services:
  # ─────────────────────────────────────────
  # INFRASTRUCTURE STACK
  # ─────────────────────────────────────────
  redis-shared:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # ─────────────────────────────────────────
  # STABLE STACK (your current production)
  # ─────────────────────────────────────────
  api-gateway-stable:
    image: ghcr.io/pixelcodeeee/arroyo_seco_stage2/api-gateway:stable
    restart: always
    ports:
      - "5000:5000" # Still reachable directly for debugging
    depends_on:
      - auth-service-stable
      - catalog-service-stable
      - order-service-stable
      - reservation-service-stable
      - payment-service-stable
      - announcements-service-stable
    environment:
      - AUTH_SERVICE_URL=http://auth-service-stable:5001
      - CATALOG_SERVICE_URL=http://catalog-service-stable:5002
      - ORDER_SERVICE_URL=http://order-service-stable:5003
      - RESERVATION_SERVICE_URL=http://reservation-service-stable:5004
      - PAYMENT_SERVICE_URL=http://payment-service-stable:5005
      - ANNOUNCEMENTS_SERVICE_URL=http://announcements-service-stable:5006

  auth-service-stable:
    image: ghcr.io/pixelcodeeee/arroyo_seco_stage2/auth-service:stable
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=10.223.32.3
      - DB_USER=db_user
      - DB_PASSWORD=arroyo_password
      - DB_NAME=arroyo_seco
      - PORT=5001
      - JWT_SECRET=AlphaPrime.2026
      - REDIS_URL=redis://redis-shared:6379

  catalog-service-stable:
    image: ghcr.io/pixelcodeeee/arroyo_seco_stage2/catalog-service:stable
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=10.223.32.3
