version: '3.8'

services:
  # 1.  API Gateway - joshualuna
  api-gateway:
    build: ./api-gateway
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - catalog-service
      - order-service
      - reservation-service
      - payment-service
      - announcements-service
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5001
      - CATALOG_SERVICE_URL=http://catalog-service:5002
      - ORDER_SERVICE_URL=http://order-service:5003
      - RESERVATION_SERVICE_URL=http://reservation-service:5004
      - PAYMENT_SERVICE_URL=http://payment-service:5005
      - ANNOUNCEMENTS_SERVICE_URL=http://announcements-service:5006

  # 2.  Internal Microservices
